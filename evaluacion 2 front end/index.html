<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulario de Registro</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h2>Formulario de Registro</h2>

    <form id="formulario" novalidate>
      <div class="form-group">
        <label for="nombre">Nombre Completo</label>
        <input type="text" id="nombre" name="nombre" placeholder="Nombre completo">
        <div class="error-message" id="errorNombre"></div>
      </div>

      <div class="form-group">
        <label for="rut">Rut</label>
        <input type="text" id="rut" name="rut" placeholder="Nombre completo">
        <div class="error-message" id="errorRut"></div>
      </div>

      <div class="form-group">
        <label for="fechaNacimiento">Fecha de Nacimiento</label>
        <input type="text" id="fechaNacimiento" name="fechaNacimiento" placeholder=" / / ">
        <div class="error-message" id="errorFecha"></div>
      </div>

      <div class="form-group">
        <label for="cv">Curriculum Vitae</label>
        <input type="file" id="cv" name="cv" accept=".pdf,.docx">
        <div class="error-message" id="errorCv"></div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Correo electrónico">
        <div class="error-message" id="errorEmail"></div>
      </div>

      <div class="form-group">
        <label for="genero">Género</label>
        <select id="genero" name="genero">
          <option value="">Seleccione...</option>
          <option value="masculino">Masculino</option>
          <option value="femenino">Femenino</option>
        </select>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password">
        <div class="error-message" id="errorPassword"></div>
      </div>

      <div class="form-group">
        <label for="repetirPassword">Repetir Contraseña</label>
        <input type="password" id="repetirPassword" name="repetirPassword">
        <div class="error-message" id="errorRepetirPassword"></div>
      </div>

      <div class="buttons">
        <button type="button" class="btn-cancel" onclick="limpiarFormulario()">Cancelar</button>
        <button type="submit" class="btn-submit">Guardar</button>
      </div>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
